services:
  web:
    build: .
    user: "${UID:-1000}:${GID:-100}"
    command: gunicorn -w 1 -b 0.0.0.0:8000 einker.web:app
    restart: unless-stopped
    ports:
      - "8269:8000"
    volumes:
      - ./data:/app/data:Z
      - ./data/images:/app/static/images:Z
      - ./config:/app/config:Z
    environment:
      - APP_BASE_DIR=/app
      - HOME=/tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  watcher:
    build: .
    user: "${UID:-1000}:${GID:-100}"
    command: python -m einker.watcher
    restart: unless-stopped
    volumes:
      - ./data:/app/data:Z
      - ./data/images:/app/static/images:Z
      - ./config:/app/config:Z
    environment:
      - APP_BASE_DIR=/app
      - HOME=/tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


