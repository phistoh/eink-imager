<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Image</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;

            display: flex;
            align-items: center;
            justify-content: center;

            background:
                url("{{ url_for('static', filename='assets/paper.jpg') }}")
                repeat;

            font-family: sans-serif;
        }

        .framed {
            height: 480px;
            padding: 48px;
            box-shadow:
                0 22px 40px rgba(0, 0, 0, 0.65),
                inset 0 0 0 2px rgba(255, 255, 255, 0.08);

    background:
        url("{{ url_for('static', filename='assets/frame.png') }}")
        center / 100% 100% no-repeat;
        }
    </style>
</head>
<body>
    <div class="framed">
        <img src="{{ img_src }}" />
    </div>
</body>
</html>
